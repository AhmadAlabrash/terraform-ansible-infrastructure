- name: Configure app server and run Next.js container
  hosts: app
  become: true

  tasks:
    - name: Update packages
      dnf:
        name: "*"
        state: latest
      ignore_errors: true

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Create app directory
      file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy app files
      copy:
        src: ../app/
        dest: /home/ec2-user/app/
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Build Docker image
     command: docker build -t nextjob-platform /home/ec2-user/app

    - name: Remove old container if exists
     shell: docker rm -f nextjob-platform || true

    - name: Run container
     command: docker run -d --name nextjob-platform -p 3000:3000 nextjob-platform