- name: Configure app server and run Next.js container
  hosts: app
  become: true

  vars:
    aws_region: us-east-1
    aws_account_id: "612990353866"
    ecr_registry: "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com"

  tasks:
    - name: Update packages
      dnf:
        name: "*"
        state: latest
      ignore_errors: true

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Install AWS CLI
      dnf:
        name: awscli
        state: present

    - name: Login to Amazon ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_registry }}
      args:
        executable: /bin/bash

    - name: Pull Docker image from ECR
      command: docker pull {{ docker_image }}

    - name: Remove old container if exists
      shell: docker rm -f nextjob-platform || true

    - name: Run container
      command: docker run -d --name nextjob-platform -p 3000:3000 {{ docker_image }}
